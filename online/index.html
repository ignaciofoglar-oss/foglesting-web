<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<!-- Asegura que los recursos relativos (CSS, worker.js) resuelvan bien aunque la URL sea /online (sin barra final). -->
<base href="/online/"/>
<title>Foglesting Online | Nesting de Chapa en tu Navegador</title>
<meta content="Optimizá el corte de chapa metálica directamente desde tu navegador con el motor C++ de Foglesting compilado a WebAssembly. Free online sheet metal nesting software for DXF files, running in your browser." name="description"/>
<link href="assets/favicon.png" rel="icon" type="image/png"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="style.css?v=nocache_2" rel="stylesheet"/>
</head>
<body>
<!-- Background Canvas for Neural Network & Fire Effect -->
<canvas id="bg-canvas"></canvas>
<div class="container">
<header>
<a aria-label="Volver a la pagina principal" class="back-home" href="../" title="Volver a la pagina principal">
<svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
<path d="M12 18l-6-6 6-6"></path>
<path d="M18 12H6"></path>
</svg>
</a>
<div class="logo-row">
<img alt="Foglesting" class="header-logo" src="assets/nuevo_logo_beige.png"/>
<div>
<h1 data-i18n="txt_100" style="display: flex; align-items: center; gap: 10px; margin: 0;"><span style="display: flex; align-items: center;"><span class="fire-text">Fogl</span><span class="forest-text">esting</span></span> <span class="accent">Online</span></h1>
<a href="editor.html" class="btn" data-i18n="txt_132" style="margin-top: 8px; padding: 4px 12px; font-size: 0.8rem; border: 1px solid var(--fire); color: var(--fire); text-decoration: none; border-radius: 6px; display: inline-block;">Abrir Editor DXF</a>
</div>
</div>
<button aria-label="Cambiar idioma" class="lang-btn" id="lang-toggle">EN</button>
</header>
<main>
<!-- Upload Zone -->
<div class="upload-section" id="drop-zone">
<svg fill="none" height="48" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="48">
<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
<polyline points="17 8 12 3 7 8"></polyline>
<line x1="12" x2="12" y1="3" y2="15"></line>
</svg>
<p class="upload-text" data-i18n="txt_101">Arrastrá tus archivos <strong>.dxf</strong> aquí</p>
<span class="or" data-i18n="txt_102">o</span>
<label class="btn btn-primary" data-i18n="txt_103" for="file-input">Seleccionar Archivos</label>
<input accept=".dxf" hidden="" id="file-input" multiple="" type="file"/>
<div class="file-list" id="file-list"></div>
</div>
<!-- Input Parts Preview -->
<div class="preview-panel" id="input-preview-panel" style="display:none;">
<h3 data-i18n="txt_104">
<svg fill="none" height="24" stroke="var(--fire)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" style="vertical-align: middle; margin-right: 6px; margin-bottom: 4px;" viewbox="0 0 24 24" width="24">
<path d="M12 2L2 7l10 5 10-5-10-5z"></path>
<path d="M2 17l10 5 10-5"></path>
<path d="M2 12l10 5 10-5"></path>
</svg>
                    Piezas Cargadas
                </h3>
<div class="parts-grid" id="input-parts-grid"></div>
</div>
<!-- Controls -->
<div class="controls">
<div class="control-group">
<label class="control-label" data-i18n="txt_105">
                        Tamaño de Chapa (mm)
                        <span aria-label="Ayuda: tamaño de chapa" class="info-tip" data-tip="Define el ancho y alto de la chapa disponible. Default recomendado: 2500 x 1250 mm." tabindex="0">i</span>
</label>
<div class="input-row">
<input id="sheet-width" placeholder="Ancho" type="number" value="2500"/>
<span class="x-divider">×</span>
<input id="sheet-height" placeholder="Alto" type="number" value="1250"/>
</div>
</div>
<div class="control-group">
<label class="control-label" data-i18n="txt_106">
                        Separación (mm)
                        <span aria-label="Ayuda: separación" class="info-tip" data-tip="Distancia mínima entre piezas para dejar margen de corte. Default recomendado: 5 mm." tabindex="0">i</span>
</label>
<input id="spacing" min="0" step="0.5" type="number" value="5"/>
</div>
<div class="control-group">
<label class="control-label" data-i18n="txt_107">
                        Iteraciones
                        <span aria-label="Ayuda: iteraciones" class="info-tip" data-tip="Cantidad de intentos del solver. Más iteraciones suelen mejorar el aprovechamiento, pero tardan más. Default recomendado: 50." tabindex="0">i</span>
</label>
<input id="iterations-input" max="1000" min="1" type="number" value="50"/>
</div>
<div class="control-group">
<label class="control-label" data-i18n="txt_108">
                        Población
                        <span aria-label="Ayuda: población" class="info-tip" data-tip="Cantidad de variantes que evalúa cada iteración del algoritmo genético. Más población explora más, pero consume más CPU. Default recomendado: 4." tabindex="0">i</span>
</label>
<input id="population-input" max="20" min="1" type="number" value="4"/>
</div>
<div class="control-group">
<label class="control-label" data-i18n="txt_109">
                        Tipo de optimización
                        <span aria-label="Ayuda: tipo de optimización" class="info-tip" data-tip="Bounding Box minimiza el rectángulo ocupado. Compact Area busca empaquetar más cerrado y suele ahorrar chapa en formas irregulares. Default recomendado: Compact Area." tabindex="0">i</span>
</label>
<select id="optimization-type">
<option data-i18n="txt_110" selected="" value="compact-area">Compact Area</option>
<option data-i18n="txt_111" value="bounding-box">Bounding Box</option>
</select>
</div>
<div class="control-group">
<label class="control-label" data-i18n="txt_112">
                        Rotaciones
                        <span aria-label="Ayuda: rotaciones" class="info-tip" data-tip="Define cuántos ángulos puede probar cada pieza. Más rotaciones mejoran el acomodo, pero hacen más pesado el cálculo. Default recomendado: 4 cada 90 grados." tabindex="0">i</span>
</label>
<select id="rotations">
<option data-i18n="txt_113" value="1">Sin rotación</option>
<option data-i18n="txt_114" value="2">0° y 180°</option>
<option data-i18n="txt_115" selected="" value="4">4 (cada 90°)</option>
<option data-i18n="txt_116" value="8">8 (cada 45°)</option>
</select>
</div>
<div aria-live="polite" class="settings-help" id="settings-help">
                    Ayuda de configuración.
                </div>
</div>
<!-- Aviso: invita a ejecutar el nesting cuando ya hay piezas cargadas. -->
<div id="run-hint" style="display:none; margin-bottom:10px; padding:10px 14px; border-radius:10px; background:rgba(232,91,46,0.12); border:1px solid rgba(232,91,46,0.5); color:#ffd2c2; font-size:0.9rem; line-height:1.4;"></div>
<!-- Run Button -->
<div style="display: flex; gap: 10px;">
<button class="run-btn" data-i18n="txt_117" disabled="" id="run-btn">
<span>🧬 Iniciar Nesting</span>
</button>
<button class="stop-btn" data-i18n="txt_118" id="stop-btn" style="display: none;">
<span>⏹ Detener</span>
</button>
</div>
<div class="loader-container" id="loader" style="display: none;">
<div class="dna-spinner"></div>
<p data-i18n="txt_119" id="loader-text">Evolucionando layouts...</p>
<p data-i18n="txt_120" id="loader-stats" style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;">Iteración 0 - Uso: 0%</p>
</div>
<!-- Output Preview -->
<div class="preview-panel" id="results-panel" style="display: none;">
<h3 data-i18n="txt_121">🔬 Resultado de Optimización</h3>
<div class="stats-grid">
<div class="stat-box">
<span class="stat-label" data-i18n="txt_122">Utilización</span>
<span class="stat-value" data-i18n="txt_123" id="res-util">0%</span>
</div>
<div class="stat-box">
<span class="stat-label" data-i18n="txt_124">Chapas</span>
<span class="stat-value" data-i18n="txt_125" id="res-sheets">0</span>
</div>
<div class="stat-box">
<span class="stat-label" data-i18n="txt_126">Piezas</span>
<span class="stat-value" data-i18n="txt_127" id="res-placed">0</span>
</div>
</div>
<div id="res-warning" style="display:none; margin-top:14px; padding:12px 16px; border-radius:10px; background:rgba(232,91,46,0.12); border:1px solid rgba(232,91,46,0.5); color:#ffd2c2; font-size:0.9rem; line-height:1.4;"></div>
<!-- Sheet tabs -->
<div class="sheet-tabs" id="sheet-tabs"></div>
<!-- Canvas Preview -->
<div class="canvas-wrapper">
<canvas id="nesting-canvas"></canvas>
</div>
<button class="btn btn-success" data-i18n="txt_128" id="download-btn">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20">
<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
<polyline points="7 10 12 15 17 10"></polyline>
<line x1="12" x2="12" y1="15" y2="3"></line>
</svg>
                    Descargar DXF Optimizado
                </button>
</div>

</main>

</div>
<script src="../translations.js?v=nocache_2"></script>
<script src="../i18n.js?v=nocache_2"></script>
<script src="app.js?v=filefix-20260624" type="module"></script>
<script src="../track.js?v=1" defer></script>
</body>
</html>
